<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>极光起始页 · Aurora Start</title>
    <style>
        /* ========== 全局重置 & 基础 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a1a;
            color: #ffffff;
            user-select: none;
        }

        /* ========== 背景 - 动态光晕层 ========== */
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: radial-gradient(ellipse at 20% 20%, rgba(102, 126, 234, 0.25) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(118, 75, 162, 0.30) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 50%, rgba(251, 194, 235, 0.08) 0%, transparent 70%),
                #0a0a1a;
            animation: bgPulse 12s ease-in-out infinite alternate;
        }

        .glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.5;
            pointer-events: none;
            will-change: transform;
        }
        .glow--1 {
            width: 60vw;
            height: 60vw;
            top: -10%;
            left: -10%;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.50), transparent 70%);
            animation: floatGlow1 18s ease-in-out infinite alternate;
        }
        .glow--2 {
            width: 50vw;
            height: 50vw;
            bottom: -5%;
            right: -5%;
            background: radial-gradient(circle, rgba(118, 75, 162, 0.55), transparent 70%);
            animation: floatGlow2 20s ease-in-out infinite alternate;
        }
        .glow--3 {
            width: 40vw;
            height: 40vw;
            top: 40%;
            left: 30%;
            background: radial-gradient(circle, rgba(251, 194, 235, 0.20), transparent 70%);
            animation: floatGlow3 22s ease-in-out infinite alternate;
        }

        /* ========== 背景动画 ========== */
        @keyframes bgPulse {
            0% {
                opacity: 0.8;
            }
            100% {
                opacity: 1;
            }
        }

        @keyframes floatGlow1 {
            0% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(8%, 5%) scale(1.1);
            }
            66% {
                transform: translate(-3%, 10%) scale(0.9);
            }
            100% {
                transform: translate(5%, -5%) scale(1.05);
            }
        }

        @keyframes floatGlow2 {
            0% {
                transform: translate(0, 0) scale(1);
            }
            50% {
                transform: translate(-8%, -10%) scale(1.15);
            }
            100% {
                transform: translate(10%, 8%) scale(0.9);
            }
        }

        @keyframes floatGlow3 {
            0% {
                transform: translate(0, 0) scale(1);
            }
            50% {
                transform: translate(10%, -8%) scale(1.2);
            }
            100% {
                transform: translate(-10%, 12%) scale(0.85);
            }
        }

        /* ========== 内容容器 ========== */
        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            padding: 0 24px;
        }

        .content-wrapper {
            max-height: 40vh;
            width: 100%;
            max-width: 680px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: clamp(14px, 2.5vh, 32px);
            animation: fadeUp 1.2s ease-out both;
            animation-delay: 0.2s;
        }

        /* ========== 时间 ========== */
        .time-section {
            text-align: center;
            width: 100%;
        }

        .time {
            font-size: clamp(48px, 6vw, 80px);
            font-weight: 300;
            letter-spacing: 0.04em;
            line-height: 1.1;
            background: linear-gradient(135deg, #ffffff 50%, rgba(255, 255, 255, 0.65));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 80px rgba(102, 126, 234, 0.15);
            font-variant-numeric: tabular-nums;
        }

        .date {
            margin-top: 6px;
            font-size: clamp(13px, 1.4vw, 18px);
            font-weight: 300;
            color: rgba(255, 255, 255, 0.50);
            letter-spacing: 0.12em;
            backdrop-filter: blur(4px);
            padding: 2px 16px;
            border-radius: 40px;
            display: inline-block;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        /* ========== 搜索区域 (包含历史下拉) ========== */
        .search-section {
            width: 100%;
            position: relative;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px) saturate(1.4);
            -webkit-backdrop-filter: blur(20px) saturate(1.4);
            border-radius: 60px;
            padding: 4px 4px 4px 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.50), inset 0 1px 0 rgba(255, 255, 255, 0.06);
            transition: border-color 0.3s ease, box-shadow 0.4s ease, transform 0.3s ease;
            position: relative;
            z-index: 3;
        }

        .search-box:focus-within {
            border-color: rgba(102, 126, 234, 0.50);
            box-shadow: 0 16px 64px rgba(102, 126, 234, 0.12), 0 0 0 4px rgba(102, 126, 234, 0.06),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
            transform: scale(1.01);
        }

        .search-icon {
            flex-shrink: 0;
            width: 20px;
            height: 20px;
            opacity: 0.5;
            fill: none;
            stroke: rgba(255, 255, 255, 0.70);
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: opacity 0.3s ease;
        }
        .search-box:focus-within .search-icon {
            opacity: 0.9;
            stroke: #8a9cf0;
        }

        .search-input {
            flex: 1;
            min-width: 0;
            padding: 14px 14px 14px 12px;
            font-size: clamp(15px, 1.4vw, 18px);
            font-weight: 400;
            color: #ffffff;
            background: transparent;
            border: none;
            outline: none;
            letter-spacing: 0.02em;
        }
        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.28);
            font-weight: 300;
            letter-spacing: 0.04em;
            transition: color 0.3s ease;
        }
        .search-input::-webkit-search-cancel-button {
            display: none;
        }

        .search-btn {
            flex-shrink: 0;
            padding: 10px 24px;
            margin-left: 4px;
            font-size: clamp(13px, 1vw, 16px);
            font-weight: 500;
            color: #ffffff;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.3s ease, opacity 0.2s ease;
            box-shadow: 0 4px 16px rgba(102, 126, 234, 0.25);
            letter-spacing: 0.04em;
            white-space: nowrap;
        }
        .search-btn:hover {
            transform: scale(1.04);
            box-shadow: 0 6px 28px rgba(102, 126, 234, 0.35);
        }
        .search-btn:active {
            transform: scale(0.96);
            opacity: 0.80;
        }

        /* ===== 历史记录下拉列表 ===== */
        .history-dropdown {
            position: absolute;
            top: calc(100% + 12px);
            left: 0;
            right: 0;
            background: rgba(20, 20, 40, 0.80);
            backdrop-filter: blur(24px) saturate(1.6);
            -webkit-backdrop-filter: blur(24px) saturate(1.6);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.60);
            padding: 8px 0;
            max-height: 240px;
            overflow-y: auto;
            opacity: 0;
            transform: translateY(-8px) scale(0.96);
            pointer-events: none;
            transition: opacity 0.25s ease, transform 0.25s cubic-bezier(0.22, 0.68, 0, 1.0);
            z-index: 10;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.15) transparent;
        }
        .history-dropdown::-webkit-scrollbar {
            width: 4px;
        }
        .history-dropdown::-webkit-scrollbar-track {
            background: transparent;
        }
        .history-dropdown::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
        }

        .history-dropdown.show {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }

        .history-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            color: rgba(255, 255, 255, 0.70);
            font-size: 15px;
            cursor: pointer;
            transition: background 0.15s ease, color 0.15s ease;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            font-family: inherit;
            gap: 12px;
        }
        .history-item:hover {
            background: rgba(255, 255, 255, 0.06);
            color: #ffffff;
        }
        .history-item .history-text {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .history-item .history-delete {
            flex-shrink: 0;
            font-size: 14px;
            opacity: 0.3;
            transition: opacity 0.2s ease;
            background: none;
            border: none;
            color: inherit;
            cursor: pointer;
            padding: 0 4px;
        }
        .history-item .history-delete:hover {
            opacity: 0.8;
        }

        .history-empty {
            padding: 20px;
            text-align: center;
            color: rgba(255, 255, 255, 0.25);
            font-size: 14px;
            letter-spacing: 0.04em;
        }

        .history-actions {
            display: flex;
            justify-content: flex-end;
            padding: 8px 20px 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            gap: 12px;
        }
        .history-clear-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.25);
            font-size: 13px;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 30px;
            transition: background 0.2s ease, color 0.2s ease;
            font-family: inherit;
            letter-spacing: 0.04em;
        }
        .history-clear-btn:hover {
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.60);
        }

        /* ========== Footer — 搜索引擎切换 ========== */
        .footer {
            position: fixed;
            bottom: 28px;
            left: 0;
            right: 0;
            z-index: 1;
            text-align: center;
            font-size: 14px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.25);
            letter-spacing: 0.12em;
            animation: fadeUp 1.2s ease-out both;
            animation-delay: 1.0s;
        }

        .footer-trigger {
            display: inline-block;
            cursor: pointer;
            padding: 6px 18px;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(4px);
            transition: background 0.3s ease, border-color 0.3s ease, color 0.3s ease;
            user-select: none;
        }
        .footer-trigger:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.12);
            color: rgba(255, 255, 255, 0.55);
        }
        .footer-trigger .icon-arrow {
            display: inline-block;
            margin-left: 6px;
            font-size: 10px;
            transition: transform 0.3s ease;
        }
        .footer-trigger.active .icon-arrow {
            transform: rotate(180deg);
        }

        /* ===== 搜索引擎弹出面板 ===== */
        .engine-popup {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) scale(0.92) translateY(12px);
            background: rgba(20, 20, 40, 0.75);
            backdrop-filter: blur(24px) saturate(1.6);
            -webkit-backdrop-filter: blur(24px) saturate(1.6);
            border-radius: 20px;
            padding: 10px 0;
            min-width: 200px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.70), inset 0 1px 0 rgba(255, 255, 255, 0.04);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s ease, transform 0.35s cubic-bezier(0.22, 0.68, 0, 1.0);
            z-index: 10;
        }
        .engine-popup.show {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(-50%) scale(1) translateY(0);
        }

        .engine-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 28px;
            color: rgba(255, 255, 255, 0.70);
            font-weight: 400;
            font-size: 15px;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: background 0.2s ease, color 0.2s ease;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            font-family: inherit;
        }
        .engine-item:hover {
            background: rgba(255, 255, 255, 0.06);
            color: #ffffff;
        }
        .engine-item:active {
            background: rgba(255, 255, 255, 0.02);
        }
        .engine-item .check {
            margin-left: auto;
            opacity: 0;
            transition: opacity 0.3s ease;
            font-size: 14px;
            color: #8a9cf0;
        }
        .engine-item.active .check {
            opacity: 1;
        }
        .engine-item .logo {
            font-size: 18px;
            line-height: 1;
            width: 28px;
            text-align: center;
        }

        .popup-overlay {
            position: fixed;
            inset: 0;
            z-index: 9;
            background: transparent;
            pointer-events: none;
            transition: background 0.3s ease;
        }
        .popup-overlay.show {
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.15);
        }

        /* ========== 响应式 ========== */
        @media (max-width: 640px) {
            .search-box {
                padding: 4px 4px 4px 16px;
                border-radius: 48px;
            }
            .search-input {
                padding: 12px 10px 12px 8px;
                font-size: 15px;
            }
            .search-btn {
                padding: 8px 16px;
                font-size: 13px;
            }
            .search-icon {
                width: 17px;
                height: 17px;
            }
            .date {
                font-size: 12px;
                padding: 2px 12px;
            }
            .glow--1 {
                width: 80vw;
                height: 80vw;
            }
            .glow--2 {
                width: 70vw;
                height: 70vw;
            }
            .glow--3 {
                width: 60vw;
                height: 60vw;
            }
            .content-wrapper {
                gap: clamp(12px, 2vh, 20px);
            }
            .engine-popup {
                min-width: 170px;
                bottom: 72px;
            }
            .engine-item {
                padding: 10px 20px;
                font-size: 14px;
            }
            .footer {
                font-size: 13px;
                bottom: 22px;
            }
            .history-dropdown {
                max-height: 180px;
            }
            .history-item {
                padding: 8px 16px;
                font-size: 14px;
            }
        }

        @media (max-width: 420px) {
            .search-btn {
                padding: 6px 12px;
                font-size: 12px;
            }
            .search-input {
                padding: 10px 6px 10px 6px;
                font-size: 14px;
            }
            .search-box {
                padding: 3px 3px 3px 12px;
            }
            .search-icon {
                width: 15px;
                height: 15px;
            }
            .time {
                font-size: 42px;
            }
            .content-wrapper {
                gap: 12px;
            }
            .engine-popup {
                min-width: 150px;
                bottom: 66px;
            }
            .engine-item {
                padding: 8px 16px;
                font-size: 13px;
            }
            .history-dropdown {
                max-height: 150px;
            }
            .history-item {
                padding: 6px 14px;
                font-size: 13px;
            }
        }

        ::-webkit-scrollbar {
            display: none;
        }

        /* ========== 入场动画 ========== */
        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(16px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <!-- ===== 背景光晕 ===== -->
    <div class="bg-layer" aria-hidden="true">
        <div class="glow glow--1"></div>
        <div class="glow glow--2"></div>
        <div class="glow glow--3"></div>
    </div>

    <!-- ===== 主内容 ===== -->
    <div class="container">

        <div class="content-wrapper">
            <!-- 时间 -->
            <div class="time-section">
                <div class="time" id="time">--:--:--</div>
                <div class="date" id="date">----年--月--日 星期-</div>
            </div>

            <!-- 搜索 (含历史下拉) -->
            <div class="search-section">
                <form id="searchForm" action="https://www.bing.com/search" method="get" target="_blank" autocomplete="off">
                    <div class="search-box">
                        <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true">
                            <circle cx="11" cy="11" r="8" />
                            <line x1="21" y1="21" x2="16.65" y2="16.65" />
                        </svg>
                        <input
                        class="search-input"
                        id="searchInput"
                        type="text"
                        name="q"
                        placeholder="在 Bing 中搜索…"
                        autofocus
                        aria-label="搜索框"
                        autocomplete="off"
                        />
                        <button class="search-btn" type="submit">搜索</button>
                    </div>
                </form>

                <!-- 历史记录下拉 -->
                <div class="history-dropdown" id="historyDropdown">
                    <!-- 由 JS 动态渲染 -->
                </div>
            </div>
        </div>

    </div>

    <!-- ===== Footer ===== -->
    <div class="footer">
        <span class="footer-trigger" id="engineTrigger">
            <span id="currentEngineLabel">✦ &nbsp;Bing</span>
            <span class="icon-arrow">▾</span>
        </span>
    </div>

    <!-- ===== 搜索引擎弹出面板 ===== -->
    <div class="popup-overlay" id="popupOverlay"></div>
    <div class="engine-popup" id="enginePopup" role="menu">
        <button class="engine-item active" data-engine="bing" data-url="https://www.bing.com/search" data-placeholder="在 Bing 中搜索…">
            <span class="logo">🔍</span> Bing
            <span class="check">✓</span>
        </button>
        <button class="engine-item" data-engine="baidu" data-url="https://www.baidu.com/s" data-placeholder="在 百度 中搜索…">
            <span class="logo">🌐</span> 百度
            <span class="check">✓</span>
        </button>
        <button class="engine-item" data-engine="yandex" data-url="https://yandex.com/search/" data-placeholder="在 Yandex 中搜索…">
            <span class="logo">🌍</span> Yandex
            <span class="check">✓</span>
        </button>
    </div>

    <!-- ===== JavaScript ===== -->
    <script>
        (function() {
            'use strict';

            // ===== DOM 引用 =====
            const timeEl = document.getElementById('time');
            const dateEl = document.getElementById('date');
            const searchForm = document.getElementById('searchForm');
            const searchInput = document.getElementById('searchInput');
            const engineTrigger = document.getElementById('engineTrigger');
            const currentEngineLabel = document.getElementById('currentEngineLabel');
            const popup = document.getElementById('enginePopup');
            const overlay = document.getElementById('popupOverlay');
            const engineItems = popup.querySelectorAll('.engine-item');
            const historyDropdown = document.getElementById('historyDropdown');

            const WEEKDAYS = ['日', '一', '二', '三', '四', '五', '六'];

            // ===== 时钟 =====
            function pad(n) { return String(n).padStart(2, '0'); }

            function updateClock() {
                const now = new Date();
                const h = now.getHours(),
                    m = now.getMinutes(),
                    s = now.getSeconds();
                timeEl.textContent = pad(h) + ':' + pad(m) + ':' + pad(s);
                const year = now.getFullYear(),
                    month = now.getMonth() + 1,
                    day = now.getDate(),
                    wd = WEEKDAYS[now.getDay()];
                dateEl.textContent = year + '年' + month + '月' + day + '日 星期' + wd;
            }
            updateClock();
            setInterval(updateClock, 1000);

            // ===== 搜索引擎配置 =====
            const ENGINES = {
                bing: {
                    url: 'https://www.bing.com/search',
                    param: 'q',
                    placeholder: '在 Bing 中搜索…',
                    label: '✦ &nbsp;Bing'
                },
                baidu: {
                    url: 'https://www.baidu.com/s',
                    param: 'wd',
                    placeholder: '在 百度 中搜索…',
                    label: '✦ &nbsp;百度'
                },
                yandex: {
                    url: 'https://yandex.com/search/',
                    param: 'text',
                    placeholder: '在 Yandex 中搜索…',
                    label: '✦ &nbsp;Yandex'
                }
            };

            let currentEngine = 'bing';

            // ===== 切换搜索引擎 =====
            function setEngine(engineKey) {
                if (!ENGINES[engineKey]) return;
                const config = ENGINES[engineKey];
                currentEngine = engineKey;

                searchForm.action = config.url;
                searchInput.name = config.param;
                searchInput.placeholder = config.placeholder;
                currentEngineLabel.innerHTML = config.label;

                engineItems.forEach(item => {
                    const key = item.dataset.engine;
                    if (key === engineKey) {
                        item.classList.add('active');
                    } else {
                        item.classList.remove('active');
                    }
                });

                closePopup();

                searchInput.style.transition = 'box-shadow 0.25s ease';
                searchInput.style.boxShadow = '0 0 0 3px rgba(102, 126, 234, 0.25)';
                setTimeout(() => {
                    searchInput.style.boxShadow = 'none';
                }, 400);

                try {
                    localStorage.setItem('preferredEngine', engineKey);
                } catch (_) {}
            }

            // ===== 引擎弹出控制 =====
            function openPopup() {
                popup.classList.add('show');
                overlay.classList.add('show');
                engineTrigger.classList.add('active');
            }

            function closePopup() {
                popup.classList.remove('show');
                overlay.classList.remove('show');
                engineTrigger.classList.remove('active');
            }

            function togglePopup() {
                if (popup.classList.contains('show')) {
                    closePopup();
                } else {
                    openPopup();
                }
            }

            engineTrigger.addEventListener('click', function(e) {
                e.stopPropagation();
                togglePopup();
            });
            overlay.addEventListener('click', function() { closePopup(); });
            engineItems.forEach(item => {
                item.addEventListener('click', function() {
                    const key = this.dataset.engine;
                    if (key) setEngine(key);
                });
            });
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    if (popup.classList.contains('show')) closePopup();
                    if (historyDropdown.classList.contains('show')) hideHistory();
                }
            });
            document.addEventListener('click', function(e) {
                if (popup.classList.contains('show')) {
                    const isTrigger = engineTrigger.contains(e.target);
                    const isPopup = popup.contains(e.target);
                    if (!isTrigger && !isPopup) closePopup();
                }
            });

            // ===== 历史记录管理 =====
            const STORAGE_KEY = 'searchHistory';
            const MAX_HISTORY = 30;

            function getHistory() {
                try {
                    const data = localStorage.getItem(STORAGE_KEY);
                    return data ? JSON.parse(data) : [];
                } catch (_) { return []; }
            }

            function saveHistory(history) {
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
                } catch (_) {}
            }

            function addHistoryItem(query) {
                query = query.trim();
                if (!query) return;
                let history = getHistory();
                history = history.filter(item => item !== query);
                history.unshift(query);
                if (history.length > MAX_HISTORY) {
                    history = history.slice(0, MAX_HISTORY);
                }
                saveHistory(history);
                renderHistory();
            }

            function deleteHistoryItem(query) {
                let history = getHistory();
                history = history.filter(item => item !== query);
                saveHistory(history);
                renderHistory();
            }

            function clearAllHistory() {
                saveHistory([]);
                renderHistory();
                hideHistory();
            }

            // 转义显示（仅用于展示，防止 XSS）
            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            function renderHistory() {
                const history = getHistory();
                if (history.length === 0) {
                    historyDropdown.innerHTML = `
                        <div class="history-empty">暂无搜索历史</div>
                    `;
                    return;
                }
                let html = '';
                history.forEach(item => {
                    html += `
                        <div class="history-item">
                            <span class="history-text">${escapeHtml(item)}</span>
                            <button class="history-delete" aria-label="删除">✕</button>
                        </div>
                    `;
                });
                html += `
                    <div class="history-actions">
                        <button class="history-clear-btn" id="clearHistoryBtn">清空全部</button>
                    </div>
                `;
                historyDropdown.innerHTML = html;

                // 绑定事件：点击历史项
                historyDropdown.querySelectorAll('.history-item').forEach(itemEl => {
                    const textSpan = itemEl.querySelector('.history-text');
                    // 点击整个条目（除删除按钮）触发搜索
                    itemEl.addEventListener('click', function(e) {
                        if (e.target.classList.contains('history-delete')) return;
                        const query = textSpan.textContent; // 原始文本
                        if (query) {
                            searchInput.value = query;
                            searchForm.submit();
                            hideHistory();
                        }
                    });
                    // 删除按钮
                    const delBtn = itemEl.querySelector('.history-delete');
                    if (delBtn) {
                        delBtn.addEventListener('click', function(e) {
                            e.stopPropagation();
                            const query = textSpan.textContent;
                            if (query) deleteHistoryItem(query);
                        });
                    }
                });

                const clearBtn = document.getElementById('clearHistoryBtn');
                if (clearBtn) {
                    clearBtn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        clearAllHistory();
                    });
                }
            }

            // ===== 显示/隐藏历史下拉 =====
            let hideTimeout = null;

            function showHistory() {
                renderHistory();
                historyDropdown.classList.add('show');
            }

            function hideHistory() {
                if (hideTimeout) clearTimeout(hideTimeout);
                hideTimeout = setTimeout(() => {
                    historyDropdown.classList.remove('show');
                }, 150);
            }

            searchInput.addEventListener('focus', function() {
                if (hideTimeout) clearTimeout(hideTimeout);
                showHistory();
            });

            document.addEventListener('click', function(e) {
                const isSearchSection = searchInput.closest('.search-section')?.contains(e.target);
                const isDropdown = historyDropdown.contains(e.target);
                if (!isSearchSection && !isDropdown) {
                    hideHistory();
                }
            });

            // 表单提交：保存历史 + 正常提交
            searchForm.addEventListener('submit', function(e) {
                const val = searchInput.value.trim();
                if (val === '') {
                    e.preventDefault();
                    searchInput.style.transition = 'box-shadow 0.2s ease';
                    searchInput.style.boxShadow = '0 0 0 3px rgba(255, 100, 100, 0.2)';
                    setTimeout(() => {
                        searchInput.style.boxShadow = 'none';
                    }, 600);
                    return;
                }
                addHistoryItem(val);
                hideHistory();
                // 正常提交
            });

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && document.activeElement === searchInput) {
                    searchInput.value = '';
                    searchInput.blur();
                    hideHistory();
                }
            });

            // ===== 恢复上次使用的搜索引擎 =====
            try {
                const saved = localStorage.getItem('preferredEngine');
                if (saved && ENGINES[saved]) {
                    setEngine(saved);
                }
            } catch (_) {}

            // ===== 初始化历史渲染 =====
            renderHistory();

            console.log('✦ 起始页已加载 · 历史记录修复完成 ✦');
        })();
    </script>

</body>
</html>
