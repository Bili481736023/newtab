<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>极光起始页 · Aurora Start</title>
    <style>
        /* ========== 全局重置 & 基础 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a1a;
            color: #ffffff;
            user-select: none;
        }

        /* ========== 背景 - 动态光晕层 ========== */
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: radial-gradient(ellipse at 20% 20%, rgba(102, 126, 234, 0.25) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(118, 75, 162, 0.30) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 50%, rgba(251, 194, 235, 0.08) 0%, transparent 70%),
                #0a0a1a;
            animation: bgPulse 12s ease-in-out infinite alternate;
        }

        .glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.5;
            pointer-events: none;
            will-change: transform;
        }
        .glow--1 {
            width: 60vw;
            height: 60vw;
            top: -10%;
            left: -10%;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.50), transparent 70%);
            animation: floatGlow1 18s ease-in-out infinite alternate;
        }
        .glow--2 {
            width: 50vw;
            height: 50vw;
            bottom: -5%;
            right: -5%;
            background: radial-gradient(circle, rgba(118, 75, 162, 0.55), transparent 70%);
            animation: floatGlow2 20s ease-in-out infinite alternate;
        }
        .glow--3 {
            width: 40vw;
            height: 40vw;
            top: 40%;
            left: 30%;
            background: radial-gradient(circle, rgba(251, 194, 235, 0.20), transparent 70%);
            animation: floatGlow3 22s ease-in-out infinite alternate;
        }

        /* ========== 背景动画 ========== */
        @keyframes bgPulse {
            0% {
                opacity: 0.8;
            }
            100% {
                opacity: 1;
            }
        }

        @keyframes floatGlow1 {
            0% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(8%, 5%) scale(1.1);
            }
            66% {
                transform: translate(-3%, 10%) scale(0.9);
            }
            100% {
                transform: translate(5%, -5%) scale(1.05);
            }
        }

        @keyframes floatGlow2 {
            0% {
                transform: translate(0, 0) scale(1);
            }
            50% {
                transform: translate(-8%, -10%) scale(1.15);
            }
            100% {
                transform: translate(10%, 8%) scale(0.9);
            }
        }

        @keyframes floatGlow3 {
            0% {
                transform: translate(0, 0) scale(1);
            }
            50% {
                transform: translate(10%, -8%) scale(1.2);
            }
            100% {
                transform: translate(-10%, 12%) scale(0.85);
            }
        }

        /* ========== 内容容器 ========== */
        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            padding: 0 24px;
        }

        .content-wrapper {
            max-height: 40vh;
            width: 100%;
            max-width: 680px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: clamp(14px, 2.5vh, 32px);
            animation: fadeUp 1.2s ease-out both;
            animation-delay: 0.2s;
        }

        /* ========== 时间 ========== */
        .time-section {
            text-align: center;
            width: 100%;
        }

        .time {
            font-size: clamp(48px, 6vw, 80px);
            font-weight: 300;
            letter-spacing: 0.04em;
            line-height: 1.1;
            background: linear-gradient(135deg, #ffffff 50%, rgba(255, 255, 255, 0.65));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 80px rgba(102, 126, 234, 0.15);
            font-variant-numeric: tabular-nums;
        }

        .date {
            margin-top: 6px;
            font-size: clamp(13px, 1.4vw, 18px);
            font-weight: 300;
            color: rgba(255, 255, 255, 0.50);
            letter-spacing: 0.12em;
            backdrop-filter: blur(4px);
            padding: 2px 16px;
            border-radius: 40px;
            display: inline-block;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        /* ========== 搜索区域 (包含历史下拉) ========== */
        .search-section {
            width: 100%;
            position: relative;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px) saturate(1.4);
            -webkit-backdrop-filter: blur(20px) saturate(1.4);
            border-radius: 60px;
            padding: 4px 4px 4px 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.50), inset 0 1px 0 rgba(255, 255, 255, 0.06);
            transition: border-color 0.3s ease, box-shadow 0.4s ease, transform 0.3s ease;
            position: relative;
            z-index: 3;
        }

        .search-box:focus-within {
            border-color: rgba(102, 126, 234, 0.50);
            box-shadow: 0 16px 64px rgba(102, 126, 234, 0.12), 0 0 0 4px rgba(102, 126, 234, 0.06),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
            transform: scale(1.01);
        }

        .search-icon {
            flex-shrink: 0;
            width: 20px;
            height: 20px;
            opacity: 0.5;
            fill: none;
            stroke: rgba(255, 255, 255, 0.70);
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: opacity 0.3s ease;
        }
        .search-box:focus-within .search-icon {
            opacity: 0.9;
            stroke: #8a9cf0;
        }

        .search-input {
            flex: 1;
            min-width: 0;
            padding: 14px 14px 14px 12px;
            font-size: clamp(15px, 1.4vw, 18px);
            font-weight: 400;
            color: #ffffff;
            background: transparent;
            border: none;
            outline: none;
            letter-spacing: 0.02em;
        }
        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.28);
            font-weight: 300;
            letter-spacing: 0.04em;
            transition: color 0.3s ease;
        }
        .search-input::-webkit-search-cancel-button {
            display: none;
        }

        .search-btn {
            flex-shrink: 0;
            padding: 10px 24px;
            margin-left: 4px;
            font-size: clamp(13px, 1vw, 16px);
            font-weight: 500;
            color: #ffffff;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.3s ease, opacity 0.2s ease;
            box-shadow: 0 4px 16px rgba(102, 126, 234, 0.25);
            letter-spacing: 0.04em;
            white-space: nowrap;
        }
        .search-btn:hover {
            transform: scale(1.04);
            box-shadow: 0 6px 28px rgba(102, 126, 234, 0.35);
        }
        .search-btn:active {
            transform: scale(0.96);
            opacity: 0.80;
        }

        /* ===== 历史记录下拉列表 ===== */
        .history-dropdown {
            position: absolute;
            top: calc(100% + 12px);
            left: 0;
            right: 0;
            background: rgba(20, 20, 40, 0.80);
            backdrop-filter: blur(24px) saturate(1.6);
            -webkit-backdrop-filter: blur(24px) saturate(1.6);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.60);
            padding: 8px 0;
            max-height: 240px;
            overflow-y: auto;
            opacity: 0;
            transform: translateY(-8px) scale(0.96);
            pointer-events: none;
            transition: opacity 0.25s ease, transform 0.25s cubic-bezier(0.22, 0.68, 0, 1.0);
            z-index: 10;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.15) transparent;
        }
        .history-dropdown::-webkit-scrollbar {
            width: 4px;
        }
        .history-dropdown::-webkit-scrollbar-track {
            background: transparent;
        }
        .history-dropdown::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
        }

        .history-dropdown.show {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }

        .history-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            color: rgba(255, 255, 255, 0.70);
            font-size: 15px;
            cursor: pointer;
            transition: background 0.15s ease, color 0.15s ease;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            font-family: inherit;
            gap: 12px;
        }
        .history-item:hover {
            background: rgba(255, 255, 255, 0.06);
            color: #ffffff;
        }
        .history-item .history-text {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .history-item .history-delete {
            flex-shrink: 0;
            font-size: 14px;
            opacity: 0.3;
            transition: opacity 0.2s ease;
            background: none;
            border: none;
            color: inherit;
            cursor: pointer;
            padding: 0 4px;
        }
        .history-item .history-delete:hover {
            opacity: 0.8;
        }

        .history-empty {
            padding: 20px;
            text-align: center;
            color: rgba(255, 255, 255, 0.25);
            font-size: 14px;
            letter-spacing: 0.04em;
        }

        .history-actions {
            display: flex;
            justify-content: flex-end;
            padding: 8px 20px 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            gap: 12px;
        }
        .history-clear-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.25);
            font-size: 13px;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 30px;
            transition: background 0.2s ease, color 0.2s ease;
            font-family: inherit;
            letter-spacing: 0.04em;
        }
        .history-clear-btn:hover {
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.60);
        }

        /* ========== Footer — 搜索引擎切换 ========== */
        .footer {
            position: fixed;
            bottom: 28px;
            left: 0;
            right: 0;
            z-index: 1;
            text-align: center;
            font-size: 14px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.25);
            letter-spacing: 0.12em;
            animation: fadeUp 1.2s ease-out both;
            animation-delay: 1.0s;
        }

        .footer-trigger {
            display: inline-block;
            cursor: pointer;
            padding: 6px 18px;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(4px);
            transition: background 0.3s ease, border-color 0.3s ease, color 0.3s ease;
            user-select: none;
        }
        .footer-trigger:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.12);
            color: rgba(255, 255, 255, 0.55);
        }
        .footer-trigger .icon-arrow {
            display: inline-block;
            margin-left: 6px;
            font-size: 10px;
            transition: transform 0.3s ease;
        }
        .footer-trigger.active .icon-arrow {
            transform: rotate(180deg);
        }

        /* ===== 搜索引擎弹出面板 ===== */
        .engine-popup {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) scale(0.92) translateY(12px);
            background: rgba(20, 20, 40, 0.75);
            backdrop-filter: blur(24px) saturate(1.6);
            -webkit-backdrop-filter: blur(24px) saturate(1.6);
            border-radius: 20px;
            padding: 10px 0;
            min-width: 200px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.70), inset 0 1px 0 rgba(255, 255, 255, 0.04);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s ease, transform 0.35s cubic-bezier(0.22, 0.68, 0, 1.0);
            z-index: 10;
        }
        .engine-popup.show {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(-50%) scale(1) translateY(0);
        }

        .engine-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 28px;
            color: rgba(255, 255, 255, 0.70);
            font-weight: 400;
            font-size: 15px;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: background 0.2s ease, color 0.2s ease;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            font-family: inherit;
        }
        .engine-item:hover {
            background: rgba(255, 255, 255, 0.06);
            color: #ffffff;
        }
        .engine-item:active {
            background: rgba(255, 255, 255, 0.02);
        }
        .engine-item .check {
            margin-left: auto;
            opacity: 0;
            transition: opacity 0.3s ease;
            font-size: 14px;
            color: #8a9cf0;
        }
        .engine-item.active .check {
            opacity: 1;
        }
        .engine-item .logo {
            font-size: 18px;
            line-height: 1;
            width: 28px;
            text-align: center;
        }

        .popup-overlay {
            position: fixed;
            inset: 0;
            z-index: 9;
            background: transparent;
            pointer-events: none;
            transition: background 0.3s ease;
        }
        .popup-overlay.show {
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.15);
        }

        /* ========== 响应式 ========== */
        @media (max-width: 640px) {
            .search-box {
                padding: 4px 4px 4px 16px;
                border-radius: 48px;
            }
            .search-input {
                padding: 12px 10px 12px 8px;
                font-size: 15px;
            }
            .search-btn {
                padding: 8px 16px;
                font-size: 13px;
            }
            .search-icon {
                width: 17px;
                height: 17px;
            }
            .date {
                font-size: 12px;
                padding: 2px 12px;
            }
            .glow--1 {
                width: 80vw;
                height: 80vw;
            }
            .glow--2 {
                width: 70vw;
                height: 70vw;
            }
            .glow--3 {
                width: 60vw;
                height: 60vw;
            }
            .content-wrapper {
                gap: clamp(12px, 2vh, 20px);
            }
            .engine-popup {
                min-width: 170px;
                bottom: 72px;
            }
            .engine-item {
                padding: 10px 20px;
                font-size: 14px;
            }
            .footer {
                font-size: 13px;
                bottom: 22px;
            }
            .history-dropdown {
                max-height: 180px;
            }
            .history-item {
                padding: 8px 16px;
                font-size: 14px;
            }
        }

        @media (max-width: 420px) {
            .search-btn {
                padding: 6px 12px;
                font-size: 12px;
            }
            .search-input {
                padding: 10px 6px 10px 6px;
                font-size: 14px;
            }
            .search-box {
                padding: 3px 3px 3px 12px;
            }
            .search-icon {
                width: 15px;
                height: 15px;
            }
            .time {
                font-size: 42px;
            }
            .content-wrapper {
                gap: 12px;
            }
            .engine-popup {
                min-width: 150px;
                bottom: 66px;
            }
            .engine-item {
                padding: 8px 16px;
                font-size: 13px;
            }
            .history-dropdown {
                max-height: 150px;
            }
            .history-item {
                padding: 6px 14px;
                font-size: 13px;
            }
        }

        ::-webkit-scrollbar {
            display: none;
        }

        /* ========== 入场动画 ========== */
        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(16px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <!-- ===== 背景光晕 ===== -->
    <div class="bg-layer" aria-hidden="true">
        <div class="glow glow--1"></div>
        <div class="glow glow--2"></div>
        <div class="glow glow--3"></div>
    </div>

    <!-- ===== 主内容 ===== -->
    <div class="container">

        <div class="content-wrapper">
            <!-- 时间 -->
            <div class="time-section">
                <div class="time" id="time">--:--:--</div>
                <div class="date" id="date">----年--月--日 星期-</div>
            </div>

            <!-- 搜索 (含历史下拉) -->
            <div class="search-section">
                <form id="searchForm" action="https://www.bing.com/search" method="get" target="_blank" autocomplete="off">
                    <div class="search-box">
                        <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true">
                            <circle cx="11" cy="11" r="8" />
                            <line x1="21" y1="21" x2="16.65" y2="16.65" />
                        </svg>
                        <input
                        class="search-input"
                        id="searchInput"
                        type="text"
                        name="q"
                        placeholder="在 Bing 中搜索…"
                        autofocus
                        aria-label="搜索框"
                        autocomplete="off"
                        />
                        <button class="search-btn" type="submit">搜索</button>
                    </div>
                </form>

                <!-- 历史记录下拉 -->
                <div class="history-dropdown" id="historyDropdown">
                    <!-- 由 JS 动态渲染 -->
                </div>
            </div>
        </div>

    </div>

    <!-- ===== Footer ===== -->
    <div class="footer">
        <span class="footer-trigger" id="engineTrigger">
            <span id="currentEngineLabel">✦ &nbsp;Bing</span>
            <span class="icon-arrow">▾</span>
        </span>
    </div>

    <!-- ===== 搜索引擎弹出面板 ===== -->
    <div class="popup-overlay" id="popupOverlay"></div>
    <div class="engine-popup" id="enginePopup" role="menu">
        <button class="engine-item active" data-engine="bing" data-url="https://www.bing.com/search" data-placeholder="在 Bing 中搜索…">
            <span class="logo">🔍</span> Bing
            <span class="check">✓</span>
        </button>
        <button class="engine-item" data-engine="baidu" data-url="https://www.baidu.com/s" data-placeholder="在 百度 中搜索…">
            <span class="logo">🌐</span> 百度
            <span class="check">✓</span>
        </button>
        <button class="engine-item" data-engine="yandex" data-url="https://yandex.com/search/" data-placeholder="在 Yandex 中搜索…">
            <span class="logo">🌍</span> Yandex
            <span class="check">✓</span>
        </button>
    </div>

    <!-- ===== 引用外部 JavaScript ===== -->
    <script src="script.js"></script>

</body>
</html>
